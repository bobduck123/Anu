name: m0-runtime-contracts

on:
  pull_request:
  push:
    branches: [main, merge/prisma-packages]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-next
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend-next/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  impact:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/impact-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: services/impact-service/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  core-runtime:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flora-fauna/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python ../../scripts/smoke-core-runtime.py

  contract-and-env:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/verify-env-contract.py
