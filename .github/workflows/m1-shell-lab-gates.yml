name: m1-shell-lab-gates

on:
  pull_request:
  push:
    branches: [main, merge/prisma-packages]

jobs:
  shell-lab-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-next
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend-next/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npx vitest run src/test/anuUiLab.test.tsx src/test/realmRegistryShellMetadata.test.ts src/test/shellMetadataApiRoute.test.ts
