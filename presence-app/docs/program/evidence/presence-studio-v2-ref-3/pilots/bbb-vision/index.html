<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Site Landing</title>
    <link rel="stylesheet" href="./landing.css">
  </head>
  <body>
    <main class="landing-shell">
      <section class="fade-show" aria-label="Landing slideshow">
        <div class="fs-slides">
          <div class="fs-slide active" style="background-image: url('./assets/landing-slider-shots/sparkle.JPG');"></div>
          <div class="fs-slide" style="background-image: url('./assets/landing-slider-shots/akka.JPG');"></div>
          <div class="fs-slide" style="background-image: url('./assets/landing-slider-shots/ballerina.JPG');"></div>
          <div class="fs-slide" style="background-image: url('./assets/landing-slider-shots/ballerina (1).JPG');"></div>
          <div class="fs-slide" style="background-image: url('./assets/landing-slider-shots/ballerina (2).JPG');"></div>
          <div class="fs-slide" style="background-image: url('./assets/landing-slider-shots/CD.JPG');"></div>
          <div class="fs-slide" style="background-image: url('./assets/landing-slider-shots/fashion week_.JPG');"></div>
          <div class="fs-slide" style="background-image: url('./assets/landing-slider-shots/Liv.e.JPG');"></div>
          <div class="fs-slide" style="background-image: url('./assets/landing-slider-shots/mk.gee.JPG');"></div>
          <div class="fs-slide" style="background-image: url('./assets/landing-slider-shots/tems.JPG');"></div>
        </div>

        <div class="fs-quick-nav" role="tablist" aria-label="Slideshow navigation">
          <button class="fs-quick-btn active" type="button" aria-label="Show slide 1" data-slide="0"></button>
          <button class="fs-quick-btn" type="button" aria-label="Show slide 2" data-slide="1"></button>
          <button class="fs-quick-btn" type="button" aria-label="Show slide 3" data-slide="2"></button>
          <button class="fs-quick-btn" type="button" aria-label="Show slide 4" data-slide="3"></button>
          <button class="fs-quick-btn" type="button" aria-label="Show slide 5" data-slide="4"></button>
          <button class="fs-quick-btn" type="button" aria-label="Show slide 6" data-slide="5"></button>
          <button class="fs-quick-btn" type="button" aria-label="Show slide 7" data-slide="6"></button>
          <button class="fs-quick-btn" type="button" aria-label="Show slide 8" data-slide="7"></button>
          <button class="fs-quick-btn" type="button" aria-label="Show slide 9" data-slide="8"></button>
          <button class="fs-quick-btn" type="button" aria-label="Show slide 10" data-slide="9"></button>
        </div>
      </section>

      <div class="brand-mark">bbb.vision</div>
      <a class="enter-btn" href="./gallery.html">Enter</a>
    </main>

    <script src="./landing.js"></script>
  </body>
</html>
