services:
  presence-contract-postgres:
    image: postgres:16
    container_name: presence-contract-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: presence_contract_local
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d presence_contract_local"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - presence_contract_pgdata:/var/lib/postgresql/data

volumes:
  presence_contract_pgdata:
